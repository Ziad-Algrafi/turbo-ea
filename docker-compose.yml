services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    networks:
      - turboea
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turboea}
      POSTGRES_USER: ${POSTGRES_USER:-turboea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - turboea-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turboea}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - turboea
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-turboea}
      POSTGRES_USER: ${POSTGRES_USER:-turboea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      RESET_DB: ${RESET_DB:-false}
      SEED_DEMO: ${SEED_DEMO:-false}
      SEED_BPM: ${SEED_BPM:-false}
      SEED_PPM: ${SEED_PPM:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8920}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_AUTO_CONFIGURE: ${AI_AUTO_CONFIGURE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@turboea.local}
      SMTP_TLS: ${SMTP_TLS:-true}
      NVD_API_KEY: ${NVD_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - turboea
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8920}:80"

  # Optional: MCP server for AI tool integration (Claude, Copilot, Cursor, etc.)
  # Activate with:  docker compose --profile mcp up -d
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    profiles: ["mcp"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - turboea
    environment:
      TURBO_EA_URL: http://backend:8000
      TURBO_EA_PUBLIC_URL: ${TURBO_EA_PUBLIC_URL:-http://localhost:8920}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-http://localhost:8920/mcp}
      MCP_PORT: "8001"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: bundled Ollama for AI suggestions.
  # Activate with:  docker compose --profile ai up -d
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    restart: unless-stopped
    networks:
      - turboea
    expose:
      - "11434"
    volumes:
      - turboea-ollama:/root/.ollama
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-4G}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  turboea:

volumes:
  turboea-pgdata:
  turboea-ollama:
